<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battery RUL Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <div class="background-elements">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="dashboard-container">
      <header>
        <div class="logo-container">
          <svg class="battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect>
            <line x1="22" y1="11" x2="22" y2="13"></line>
            <line x1="6" y1="12" x2="6" y2="12"></line>
            <line x1="10" y1="12" x2="10" y2="12"></line>
            <line x1="14" y1="12" x2="14" y2="12"></line>
          </svg>
          <h1>Battery Intelligence</h1>
        </div>
        <p class="subtitle">Predictive Maintenance for GTZ 5S Batteries</p>
      </header>

      <div class="content-grid">
        <!-- Input Form Panel -->
        <section class="glass-panel input-panel">
          <h2>Parameters</h2>
          <form id="prediction-form">
            <div class="input-group">
              <label for="capacity">Capacity (Ah)</label>
              <div class="input-wrapper">
                <input type="number" id="capacity" name="capacity" step="0.01" placeholder="e.g. 5.5" required>
                <span class="unit">Ah</span>
              </div>
            </div>

            <div class="input-group">
              <label for="soh">State of Health (%)</label>
              <div class="input-wrapper">
                <input type="number" id="soh" name="soh" step="0.1" max="100" min="0" placeholder="e.g. 85.0" required>
                <span class="unit">%</span>
              </div>
            </div>

            <div class="input-group">
              <label for="voltage_drop">Voltage Drop (V)</label>
              <div class="input-wrapper">
                <input type="number" id="voltage_drop" name="voltage_drop" step="0.01" placeholder="e.g. 0.5" required>
                <span class="unit">V</span>
              </div>
            </div>

            <div class="input-group">
              <label for="min_voltage">Minimum Voltage (V)</label>
              <div class="input-wrapper">
                <input type="number" id="min_voltage" name="min_voltage" step="0.01" placeholder="e.g. 11.2" required>
                <span class="unit">V</span>
              </div>
            </div>

            <button type="submit" class="primary-btn">
              <span>Predict Lifecycle</span>
              <div class="spinner hidden" id="loading-spinner"></div>
            </button>
          </form>
        </section>

        <!-- Results Panel -->
        <section class="glass-panel result-panel">
          <h2>Prediction Results</h2>
          <div id="results-container" class="results-empty">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <p>Enter parameters and run prediction to see results</p>
            </div>
          </div>

          <div id="results-content" class="hidden">
            <div class="metric-card primary-metric">
              <h3>Remaining Useful Life</h3>
              <div class="value-container">
                <span class="value" id="rul-value">--</span>
                <span class="unit">Cycles</span>
              </div>
            </div>

            <div class="metric-card status-card">
              <h3>Battery Status</h3>
              <div class="status-indicator" id="status-container">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">--</span>
              </div>
            </div>

            <div class="action-recommendation" id="recommendation-box">
              <h4 id="recommendation-title">Recommendation</h4>
              <p id="recommendation-text">--</p>
            </div>
          </div>

          <!-- Error message container -->
          <div id="error-container" class="hidden error-message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="error-text"></span>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
